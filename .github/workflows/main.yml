name: Create Binaries

on:
   workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  linux-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install ALSA
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Create Executable
        uses: sayyid5416/pyinstaller@v1
        with:
          python_ver: '3.11'
          spec: 'JParty.spec'
          requirements: 'requirements.txt'
          upload_exe_with_name: 'JParty_linux'

  windows-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create Executable
        uses: sayyid5416/pyinstaller@v1
        with:
          python_ver: '3.11'
          spec: 'JParty.spec'
          requirements: 'requirements.txt'
          upload_exe_with_name: 'JParty_windows'

  macos-arm-build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create Executable
        uses: sayyid5416/pyinstaller@v1
        with:
          python_ver: '3.11'
          spec: 'JParty.spec'
          requirements: 'requirements.txt'
          upload_exe_with_name: 'JParty_macos_arm'

  release:
    runs-on: ubuntu-latest
    needs:
      - linux-build
      - windows-build
      - macos-arm-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(python3 - <<'PY'
          from jparty.version import version
          print(version)
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Package release assets
        run: |
          mkdir packaged-assets
          for artifact in release-assets/*; do
            artifact_name=$(basename "$artifact")
            (cd release-assets && zip -r "../packaged-assets/${artifact_name}.zip" "$artifact_name")
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: JParty v${{ steps.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
          files: packaged-assets/*
