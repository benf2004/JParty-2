<!DOCTYPE html>
<html>
    <head>
        <title>JParty! Buzzer</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
      <!--signature pad-->
        <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js" type="text/javascript" ></script>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.0/jquery.min.js" type="text/javascript"></script>
    <script type="text/javascript">
      // Expose individual theme color values (fall back to defaults if missing).
      window.jparty_theme = {
        nameLabelColor: "{% if theme and theme.get('nameLabelColor') %}{{ theme.get('nameLabelColor') }}{% else %}#1010a1{% end %}",
        boardTextColor: "{% if theme and theme.get('boardTextColor') %}{{ theme.get('boardTextColor') }}{% else %}#ffcc00{% end %}"
      };
    </script>
    <script src="{{ static_url( "buzzer.js") }}" type="text/javascript"></script>
        <link rel="stylesheet" href="{{ static_url("style.css") }}">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Anton">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3pro.css">
        <link rel="icon" type="image/x-icon" href="{{ static_url("favicon.ico") }}">
    </head>

  <body>

  <div class="w3-container buzz-page noselect" style="margin-top:90px">
      <button id="buzzer" class="jparty-button" onmousedown="buzz()">BUZZ!</button>
      <button type="button" id="start-game-button" class="jparty-button auto-host-control" onclick="startGameVote()">Start Game</button>
      <button type="button" id="play-again-button" class="jparty-button auto-host-control" onclick="playAgainVote()">Play Again</button>
      <button type="button" id="dispute-buzz-button" class="jparty-button auto-host-control dispute-button" onclick="disputeLastClue()">Dispute Last Clue</button>
      <div id="buzz-status" class="recording-status hints"></div>
      <div class="hints buzz-hint">
        Hint:</br> Turn off Auto-Lock and Low Power Mode so your buzzer doesn't go dark!
      </div>
  </div>

  <div class="w3-container name-page noselect" style="margin-top:10px">

      <div class="hints name-hint">
        Type your name and sign below
      </div>
      <input type='text' name="displayname" class="text_input display_name_input" placeholder="Your name"/>
      <canvas id="name-canvas"></canvas>

      <div class="canvas-buttons">
        <button type="button" class="jparty-button canvas-button" id="clear-button">Clear</button>
        <button type="button" class="jparty-button canvas-button" id="undo-button"> Undo</button>
        <button type="button" class="jparty-button canvas-button" id="prompt-button">Keyboard</button>
        <select name="buzzers" id="buzzers">
          <option value="" disabled>Select A Buzzer</option>
          <option value="red">Red</option>
          <option value="blue">Blue</option>
          <option value="yellow">Yellow</option>
          <option value="green">Green</option>
          <option value="white">White</option>
          <option value="black">Black</option>
          <option selected class="phone-only">Phone Only</option>
        </select>
        <button type="button" class="jparty-button submit-button" id="submit-button">Play!</button>
      </div>

      <!-- <form onsubmit="nameForm('hi');" action="javascript:void(0);" class="name_form"> -->

      <!--     <input type='text' name="playername" class="text_input" placeholder="Name"/> -->
      <!--     <button type="submit" class="submit">Play!</button> -->
      <!-- </form> -->
  </div>

  <div class="w3-container wager-page" style="margin-top:90px">
      <form onsubmit="wagerForm(this);" action="javascript:void(0);" class="wager_form">
          <input type='number' name="wager" pattern="[0-9]*" class="text_input wager_input" min="0" max="100" step="0"/>
          <button type="submit" class="jparty-button submit">Wager</button>
      </form>
  </div>

  <div class="w3-container answer-page" style="margin-top:90px">
      <form onsubmit="answerForm();" action="javascript:void(0);" class="answer_form">
          <div class="prompt">What is ...</div>
          <input type='text' name="answer" class="answer_input text_input" placeholder="Answer"/>
          <button type="submit" class="jparty-button submit">Submit</button>
      </form>
  </div>

  <div class="w3-container select-page auto-host-page" style="margin-top:20px">
      <div class="prompt">Pick the next clue</div>
      <button type="button" class="jparty-button record-button" onclick="recordAutoHostAudio('clue_selection')">Speak Clue</button>
      <button type="button" id="dispute-select-button" class="jparty-button auto-host-control dispute-button" onclick="disputeLastClue()">Dispute Last Clue</button>
      <div id="recording-status" class="recording-status hints"></div>
      <div id="clue-grid" class="clue-grid"></div>
  </div>

  <div class="w3-container record_answer-page auto-host-page" style="margin-top:90px">
      <div id="answer-record-prompt" class="prompt">Record your answer</div>
      <div id="answer-record-status" class="recording-status hints"></div>
      <button type="button" class="jparty-button record-button" onclick="recordAutoHostAudio('answer')">Record Answer</button>
      <form onsubmit="answerForm();" action="javascript:void(0);" class="answer_form fallback-form">
          <input type='text' name="answer" class="answer_input text_input" placeholder="Type answer"/>
          <button type="submit" class="jparty-button submit">Submit Text</button>
      </form>
  </div>

  <div class="w3-container dd_wager-page auto-host-page" style="margin-top:90px">
      <div class="prompt">Daily Double Wager</div>
      <button type="button" class="jparty-button record-button" onclick="recordAutoHostAudio('daily_double_wager')">Speak Wager</button>
      <div id="dd-wager-status" class="recording-status hints"></div>
      <form onsubmit="wagerForm(this);" action="javascript:void(0);" class="wager_form fallback-form">
          <input type='number' name="wager" pattern="[0-9]*" class="text_input wager_input" min="0" max="100" step="0"/>
          <button type="submit" class="jparty-button submit">Submit Wager</button>
      </form>
  </div>

  <div class="w3-container judgement-page auto-host-page" style="margin-top:90px">
      <div id="judgement-text" class="prompt"></div>
      <div id="judgement-reason" class="hints"></div>
  </div>

  <div class="w3-container challenge-page auto-host-page" style="margin-top:90px">
      <div id="challenge-text" class="prompt">Vote on the challenged answer</div>
      <button type="button" class="jparty-button submit" onclick="challengeVote('correct')">Correct</button>
      <button type="button" class="jparty-button submit" onclick="challengeVote('incorrect')">Incorrect</button>
  </div>

  <div class="w3-container dispute-page auto-host-page" style="margin-top:40px">
      <div id="dispute-text" class="prompt">Vote on the last clue</div>
      <div id="dispute-options"></div>
      <div id="dispute-status" class="recording-status hints"></div>
  </div>

  </body>

</html>
